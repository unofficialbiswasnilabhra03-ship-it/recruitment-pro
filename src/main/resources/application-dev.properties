# --- Development profile ---

spring.datasource.url=jdbc:mysql://localhost:3306/recruitpro_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

app.storage.mode=LOCAL

# Gmail SMTP (dev) - use an app password, not your real Gmail password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=CHANGE_ME@gmail.com
spring.mail.password=CHANGE_ME_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.com.recruitpro=DEBUG
logging.level.org.springframework.security=DEBUG
