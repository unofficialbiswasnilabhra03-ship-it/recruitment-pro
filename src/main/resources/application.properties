spring.application.name=recruitpro-backend

spring.profiles.active=dev

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload limits (resume uploads: PDF/DOCX)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT (placeholder values - finalized in the security/auth phase)
app.jwt.secret=CHANGE_ME_IN_ENV_REPLACE_WITH_BASE64_256BIT_SECRET
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# File storage mode: LOCAL (dev) or S3 (prod) - read by FileUtil in the upload phase
app.storage.mode=LOCAL
app.storage.local.base-path=./uploads
