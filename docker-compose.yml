version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: recruitpro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      recruitpro_dev
      MYSQL_USER:          ${MYSQL_USER:-recruitpro}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-recruitpro123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: recruitpro-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL:        jdbc:mysql://mysql:3306/recruitpro_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME:   ${MYSQL_USER:-recruitpro}
      DB_PASSWORD:   ${MYSQL_PASSWORD:-recruitpro123}
      JWT_SECRET:    ${JWT_SECRET:-CHANGE_ME_REPLACE_WITH_REAL_256BIT_BASE64_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME:-change@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change_me}
      ADMIN_EMAIL:   ${ADMIN_EMAIL:-admin@recruitpro.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@12345}
    volumes:
      - resume_uploads:/app/uploads

volumes:
  mysql_data:
  resume_uploads:
